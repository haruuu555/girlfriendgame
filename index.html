<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>她的痕迹 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0e;
            background-image: radial-gradient(circle at 20% 30%, #1e1a24 0%, #08070b 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Times New Roman', '宋体', 'SimSun', 'Palatino', serif;
            padding: 1.5rem;
            line-height: 1.6;
        }

        .trace-card {
            max-width: 700px;
            width: 100%;
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(180, 150, 120, 0.25);
            border-radius: 28px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(200, 170, 140, 0.1) inset, 0 0 30px rgba(80, 50, 30, 0.2);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 400;
            letter-spacing: 6px;
            text-align: center;
            color: #ecdcc0;
            text-shadow: 0 2px 10px #ab8e6a40, 2px 2px 0 #1f1b14;
            margin-bottom: 1.8rem;
            font-family: 'Cinzel', 'Georgia', 'Times New Roman', serif;
            word-break: keep-all;
            border-bottom: 1px dashed #a6876b40;
            padding-bottom: 0.8rem;
        }

        .story p {
            color: #cfc7bc;
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
            text-indent: 2em;
            word-spacing: 1px;
            text-shadow: 0 1px 3px black;
        }

        .story p:last-of-type {
            margin-bottom: 2.5rem;
        }

        /* 轻微点缀，仿佛旧书页边缘 */
        .story p:first-of-type::first-letter {
            font-size: 2.2rem;
            float: left;
            padding-right: 6px;
            line-height: 1;
            color: #c7a77b;
            font-weight: 400;
            font-family: 'Cinzel', serif;
            text-shadow: 1px 1px 3px #261e14;
        }

        .button-wrapper {
            text-align: center;
            margin: 2.2rem 0 1.5rem 0;
        }

        .trace-link {
            display: inline-block;
            background: #3d3126;
            background: linear-gradient(145deg, #4f3e30, #362b21);
            color: #f2e2cf;
            font-size: 1.6rem;
            font-family: 'Cinzel', 'Georgia', serif;
            letter-spacing: 4px;
            text-decoration: none;
            padding: 1rem 3rem 1.1rem 3rem;
            border-radius: 60px;
            border: 1px solid #baa080;
            box-shadow: 0 10px 15px -8px #010101, 0 0 0 1px #68553f inset, 0 0 15px #b48b5d30;
            transition: all 0.25s;
            font-weight: 400;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        .trace-link:hover {
            background: linear-gradient(145deg, #5f4d3c, #45382d);
            color: #ffffff;
            border-color: #e5c7a8;
            box-shadow: 0 15px 20px -10px black, 0 0 0 1px #b5946e inset, 0 0 25px #dbbd9b60;
            transform: scale(1.02);
            letter-spacing: 6px;
        }

        .trace-link:active {
            transform: scale(0.98);
            box-shadow: 0 5px 10px -5px black;
        }

        .instructions {
            text-align: center;
            color: #a79e93;
            font-size: 0.95rem;
            border-top: 1px dashed #5e554a;
            padding-top: 1.6rem;
            margin-top: 0.5rem;
            font-style: italic;
            letter-spacing: 0.6px;
            line-height: 1.7;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 1.4rem 1rem 1rem 1rem;
            backdrop-filter: blur(4px);
        }

        .instructions span {
            font-style: normal;
            font-weight: 500;
            color: #dac09e;
            background: #2f2a24;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-right: 6px;
            border: 1px solid #8b775e;
        }

        /* 适配手机 */
        @media (max-width: 500px) {
            .trace-card {
                padding: 1.8rem 1.2rem;
            }
            h1 {
                font-size: 2.5rem;
                letter-spacing: 3px;
            }
            .story p {
                font-size: 1rem;
            }
            .trace-link {
                font-size: 1.3rem;
                padding: 0.8rem 1.8rem;
                letter-spacing: 3px;
            }
        }

        /* 模糊褪色的痕迹 —— 极简装饰 */
        .trace-card::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid rgba(170, 140, 110, 0.12);
            border-radius: 20px;
            pointer-events: none;
            z-index: -1;
        }

        .trace-card {
            position: relative;
            z-index: 1;
        }

        /* 增加一点点手写感 */
        .story p:last-of-type::after {
            content: '……';
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #ab8e6b;
            margin-left: 5px;
            opacity: 0.8;
        }
        /* 因为原文最后已经有省略号，为避免重复，去掉伪元素或者调整 */
        .story p:last-of-type::after {
            content: none; 
        }
        /* 原文已有省略号，保留即可 */
    </style>
</head>
<body>
    <div class="trace-card">
        <h1>她的痕迹</h1>
<div class="image-wrapper" style="text-align: center; margin: 1.2rem 0;">
    <img src="images/zhongxue.jpg" alt="我们的毕业照" style="max-width: 100%; height: auto; border-radius: 12px; opacity: 0.85; box-shadow: 0 8px 20px rgba(0,0,0,0.5);">
</div>
        <div class="story">
            <p>你的女友消失了，消失的干干净净，了无痕迹。</p>
            <p>你问遍了所有你们共同的朋友、同学，以及她的同事。没有人记得你的女友致妙，她们甚至否认这个人的存在。</p>
            <p>你翻出的毕业照上，她的身影也模糊不清。甚至你们共同的家里，也没有留下她的任何物品。</p>
            <p>朋友都关心你是不是加班加疯了，从哪来的女友，你却不信邪。</p>
            <p>经过仔细回忆，你最后一次见到女友时，她正要前往一个名叫奥林匹斯图书馆的地方。为了调查，你应聘成为了这所图书馆的管理员，准备从此入手，调查女友的行踪……</p>
        </div>

        <div class="button-wrapper">
            <a href="https://haruuu555.github.io/my-girlfriend/" target="_blank" rel="noopener noreferrer" class="trace-link">开始寻找</a>
        </div>

        <div class="instructions">
            <span>玩法</span> 通过浏览网页内容，获取你认为关键的信息吧，善用搜索，可以解锁新的内容。
        </div>
    </div>

    <!-- 注：奥林匹斯图书馆的入口就在上方，愿你能找到致妙的痕迹。 -->
</body>
</html>
